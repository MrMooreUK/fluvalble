<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 560 130">
  <defs>
    <!-- Banner background gradient -->
    <linearGradient id="bg" x1="0" y1="0" x2="560" y2="130" gradientUnits="userSpaceOnUse">
      <stop offset="0%"   stop-color="#002D5B"/>
      <stop offset="100%" stop-color="#003F7E"/>
    </linearGradient>
    <!-- Fixture body gradient -->
    <linearGradient id="fix" x1="20" y1="28" x2="20" y2="52" gradientUnits="userSpaceOnUse">
      <stop offset="0%"   stop-color="#005EA3"/>
      <stop offset="100%" stop-color="#0072BB"/>
    </linearGradient>
    <!-- Beam fade -->
    <linearGradient id="beam" x1="68" y1="52" x2="68" y2="88" gradientUnits="userSpaceOnUse">
      <stop offset="0%"   stop-color="#00AEEF" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#00AEEF" stop-opacity="0"/>
    </linearGradient>
    <!-- Water shimmer -->
    <linearGradient id="wtr" x1="10" y1="0" x2="130" y2="0" gradientUnits="userSpaceOnUse">
      <stop offset="0%"   stop-color="#00579B"/>
      <stop offset="50%"  stop-color="#0097DC"/>
      <stop offset="100%" stop-color="#00579B"/>
    </linearGradient>
    <!-- Subtle ambient glow behind icon -->
    <radialGradient id="glow" cx="68" cy="60" r="60" gradientUnits="userSpaceOnUse">
      <stop offset="0%"   stop-color="#00AEEF" stop-opacity="0.10"/>
      <stop offset="100%" stop-color="#00AEEF" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- ── Background ── -->
  <rect width="560" height="130" rx="12" fill="url(#bg)"/>
  <!-- Ambient glow pool behind icon area -->
  <ellipse cx="68" cy="70" rx="65" ry="60" fill="url(#glow)"/>
  <!-- Subtle horizontal rule at bottom third -->
  <rect x="0" y="88" width="560" height="42" rx="0" fill="#001F45" opacity="0.30"/>

  <!-- ══ Icon panel (left 136 px) ══ -->

  <!-- LED fixture bar -->
  <rect x="16" y="28" width="104" height="24" rx="5" fill="url(#fix)"/>
  <!-- Top sheen -->
  <rect x="18" y="29" width="100" height="6" rx="3" fill="white" opacity="0.13"/>
  <!-- Bottom shadow -->
  <rect x="16" y="47" width="104" height="5" rx="0" fill="#002D5B" opacity="0.40"/>

  <!-- LED lenses -->
  <circle cx="30"  cy="40" r="6" fill="#DCF0FF" opacity="0.95"/>
  <circle cx="48"  cy="40" r="6" fill="#1E90D4" opacity="0.95"/>
  <circle cx="68"  cy="40" r="6" fill="#00AEEF" opacity="0.95"/>
  <circle cx="88"  cy="40" r="6" fill="#1565C0" opacity="0.95"/>
  <circle cx="106" cy="40" r="6" fill="#DCF0FF" opacity="0.95"/>

  <!-- Lens glare dots -->
  <circle cx="28"  cy="37.5" r="2.5" fill="white" opacity="0.75"/>
  <circle cx="46"  cy="37.5" r="2.5" fill="white" opacity="0.65"/>
  <circle cx="66"  cy="37.5" r="2.5" fill="white" opacity="0.72"/>
  <circle cx="86"  cy="37.5" r="2.5" fill="white" opacity="0.65"/>
  <circle cx="104" cy="37.5" r="2.5" fill="white" opacity="0.75"/>

  <!-- Light beam cone -->
  <path d="M20 52 L116 52 L122 86 L14 86 Z" fill="url(#beam)"/>

  <!-- Water waves -->
  <path d="M10 90
           C20 85  30 91  44 88
           C58 85  66 91  80 88
           C94 85  108 91  126 88
           L126 116 L10 116 Z"
        fill="url(#wtr)" opacity="0.80"/>
  <path d="M10 100
           C22 95  34 102  50 98
           C66 94  78 101  96 98
           C108 95  118 100  126 100
           L126 116 L10 116 Z"
        fill="#003F7E" opacity="0.70"/>

  <!-- ── Vertical divider ── -->
  <line x1="148" y1="18" x2="148" y2="112"
        stroke="#00AEEF" stroke-width="1" opacity="0.25"/>

  <!-- ══ Brand text (right of divider) ══ -->

  <!-- Primary wordmark -->
  <text x="168" y="72"
        font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif"
        font-size="46" font-weight="700" fill="white" letter-spacing="-1">Fluval BLE</text>

  <!-- Subtitle -->
  <text x="170" y="97"
        font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif"
        font-size="16" font-weight="400" fill="#00AEEF" letter-spacing="1.5">HOME ASSISTANT INTEGRATION</text>

  <!-- Version badge -->
  <rect x="170" y="22" width="68" height="20" rx="10" fill="#00AEEF" opacity="0.18"/>
  <text x="204" y="36"
        font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif"
        font-size="11" font-weight="600" fill="#00AEEF" text-anchor="middle" letter-spacing="0.5">v0.0.3</text>
</svg>

    <rect x="20" y="20" width="1080" height="320" fill="url(#violet-glow)"/>
    <path d="M20 286 C144 246 230 331 363 277 C502 221 610 278 747 242 C897 203 1008 238 1100 206 L1100 340 L20 340 Z" fill="#06111d" opacity="0.78"/>
    <path d="M-40 285 C104 225 225 332 372 274 C507 220 624 282 756 244 C908 201 1002 230 1160 174" fill="none" stroke="#54f7ff" stroke-opacity="0.20" stroke-width="1.4"/>
    <path d="M-60 306 C88 252 226 330 384 292 C528 258 650 314 800 264 C948 215 1020 256 1168 214" fill="none" stroke="#7c6dff" stroke-opacity="0.18" stroke-width="1.2"/>
    <g opacity="0.42">
      <path d="M646 52 h258" stroke="#ffffff" stroke-opacity="0.08"/>
      <path d="M686 88 h354" stroke="#ffffff" stroke-opacity="0.045"/>

    <text x="498" y="95" font-family="Inter, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="14" font-weight="600" letter-spacing="1.7" fill="#bafcff">LOCAL BLE CONTROL</text>
    <text x="460" y="173" font-family="Inter, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="76" font-weight="800" letter-spacing="-4.2" fill="url(#word)">Fluval BLE</text>
    <text x="466" y="218" font-family="Inter, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="24" font-weight="500" letter-spacing="-0.55" fill="#b6c6d8">Aquarium LED lighting for Home Assistant</text>
    <text x="466" y="259" font-family="Inter, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="17" font-weight="500" letter-spacing="0.35" fill="#6df8ff">NO CLOUD · NO APP · JUST YOUR TANK</text>

    <path d="M144 112 L346 112 L408 294 L82 294 Z" fill="url(#beam)"/>
    <rect x="120" y="60" width="252" height="58" rx="18" fill="url(#fixture)" stroke="#ffffff" stroke-opacity="0.10"/>
    <path d="M139 68 H353" stroke="#ffffff" stroke-opacity="0.16" stroke-width="3" stroke-linecap="round"/>
    <rect x="136" y="109" width="220" height="4" rx="2" fill="url(#fixture-edge)"/>
    <g filter="url(#cyan-glow)">
      <circle cx="158" cy="89" r="12" fill="#ecfeff"/>
      <circle cx="202" cy="89" r="12" fill="#00b7ff"/>
      <circle cx="246" cy="89" r="12" fill="#67fff0"/>
      <circle cx="290" cy="89" r="12" fill="#5077ff"/>
      <circle cx="334" cy="89" r="12" fill="#ecfeff"/>
    </g>
    <circle cx="154" cy="85" r="4" fill="#ffffff" opacity="0.75"/>
    <circle cx="198" cy="85" r="4" fill="#ffffff" opacity="0.52"/>
    <circle cx="242" cy="85" r="4" fill="#ffffff" opacity="0.65"/>
    <circle cx="286" cy="85" r="4" fill="#ffffff" opacity="0.48"/>
    <circle cx="330" cy="85" r="4" fill="#ffffff" opacity="0.75"/>
    <path d="M74 259 C111 232 145 277 188 251 C229 226 264 275 308 250 C350 226 382 263 420 246 L420 314 L74 314 Z" fill="url(#wave1)" opacity="0.62"/>
    <path d="M72 286 C120 248 164 301 211 276 C254 252 290 302 335 276 C369 257 396 279 426 265 L426 314 L72 314 Z" fill="#062f57" opacity="0.76"/>

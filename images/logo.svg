<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1120 360" role="img" aria-labelledby="title desc">
  <title id="title">Fluval BLE</title>
  <desc id="desc">Premium dark aquarium lighting brand mark for the Fluval BLE Home Assistant integration.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1120" y2="360" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#05070b"/>
      <stop offset="0.46" stop-color="#081522"/>
      <stop offset="1" stop-color="#031b2c"/>
    </linearGradient>
    <radialGradient id="aqua-glow" cx="32%" cy="20%" r="72%">
      <stop offset="0" stop-color="#74f7ff" stop-opacity="0.32"/>
      <stop offset="0.42" stop-color="#00b7ff" stop-opacity="0.12"/>
      <stop offset="1" stop-color="#00b7ff" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="violet-glow" cx="83%" cy="34%" r="58%">
      <stop offset="0" stop-color="#7c6dff" stop-opacity="0.22"/>
      <stop offset="0.46" stop-color="#5e6ad2" stop-opacity="0.08"/>
      <stop offset="1" stop-color="#5e6ad2" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="beam" x1="246" y1="110" x2="246" y2="292" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#8ffaff" stop-opacity="0.62"/>
      <stop offset="0.55" stop-color="#00c8ff" stop-opacity="0.16"/>
      <stop offset="1" stop-color="#00c8ff" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="fixture" x1="126" y1="64" x2="366" y2="118" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#111827"/>
      <stop offset="0.5" stop-color="#253b54"/>
      <stop offset="1" stop-color="#0d1723"/>
    </linearGradient>
    <linearGradient id="fixture-edge" x1="126" y1="112" x2="366" y2="112" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#00e5ff" stop-opacity="0.18"/>
      <stop offset="0.5" stop-color="#a7fbff" stop-opacity="0.72"/>
      <stop offset="1" stop-color="#5e6ad2" stop-opacity="0.18"/>
    </linearGradient>
    <linearGradient id="wave1" x1="60" y1="260" x2="430" y2="260" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#0177ff"/>
      <stop offset="0.5" stop-color="#00f0ff"/>
      <stop offset="1" stop-color="#54ffcf"/>
    </linearGradient>
    <linearGradient id="word" x1="462" y1="132" x2="1040" y2="132" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#ffffff"/>
      <stop offset="0.62" stop-color="#e8fbff"/>
      <stop offset="1" stop-color="#92f6ff"/>
    </linearGradient>
    <filter id="soft-shadow" x="-20%" y="-20%" width="140%" height="160%">
      <feDropShadow dx="0" dy="20" stdDeviation="24" flood-color="#000000" flood-opacity="0.38"/>
    </filter>
    <filter id="cyan-glow" x="-120%" y="-120%" width="340%" height="340%">
      <feGaussianBlur stdDeviation="7" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>

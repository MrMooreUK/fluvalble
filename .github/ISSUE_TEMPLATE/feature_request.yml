name: Feature Request
description: Suggest an improvement or new capability for the integration.
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for the suggestion! Please fill in as much detail as you can so we can evaluate it properly.

  - type: textarea
    id: problem
    attributes:
      label: What problem does this solve?
      description: Describe the limitation or gap you are running into.
      placeholder: "I often need to… but currently I can't because…"
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed solution
      description: What would you like to see added or changed?
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives you have considered
      description: Any workarounds you are using now, or other approaches that could work.

  - type: dropdown
    id: device_model
    attributes:
      label: Relevant device model (if applicable)
      options:
        - All models
        - Fluval Plant 3.0
        - Fluval Reef 3.0
        - Fluval Aquasky 2.0
        - Other / Unknown

  - type: textarea
    id: additional
    attributes:
      label: Additional context
      description: Links, screenshots, or anything else that supports the request.
